# =============================================================================
# TamFam self-hosted Supabase stack (trimmed)
#
# Includes only what the app uses:
#   db     - Postgres (supabase/postgres; ships pg_cron, pgcrypto, auth helpers)
#   auth   - GoTrue (magic-link email auth)
#   rest   - PostgREST (the supabase.from(...) queries)
#   kong   - API gateway that fronts /auth/v1 and /rest/v1
#   studio - Admin UI (optional; bind to localhost / behind auth only)
#   meta   - Postgres metadata API used by Studio
#
# Realtime, Storage, Functions, Analytics and the connection pooler are omitted:
# the app uses only select/upsert and has no subscriptions or file uploads.
#
# Configure via ./.env (copy from .env.example). Bring up with:
#   docker compose up -d
# Then apply the app schema once the DB + auth are healthy:
#   ./migrate.sh
# =============================================================================

name: tamfam

services:
  db:
    build: ./db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: 3600
    volumes:
      - db-data:/var/lib/postgresql/data
      # The role/auth-helper init script is baked into the image (./db/Dockerfile)
      # so it always runs, regardless of host bind-mount path resolution.
    # Not published to the host by default — only the internal network needs it.
    expose:
      - "5432"

  auth:
    image: supabase/gotrue:v2.176.1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      # NOTE: GoTrue has no env var to choose its schema — it issues unqualified
      # table names, so which schema it lands in is controlled by the
      # connecting role's Postgres `search_path`, set on supabase_auth_admin in
      # db/init/00-init.sh (ALTER ROLE ... SET search_path = auth). Without
      # that, GoTrue tries to create its tables in "public" and fails with
      # "permission denied for schema public".
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      # Invite-only: no open sign-ups. Admins invite via the GoTrue admin API / Studio.
      GOTRUE_DISABLE_SIGNUP: "true"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      # SMTP for magic-link / invite emails.
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
    expose:
      - "9999"

  rest:
    image: postgrest/postgrest:v12.2.12
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    expose:
      - "3000"

  kong:
    build: ./kong
    restart: unless-stopped
    depends_on:
      - auth
      - rest
    # Kong's declarative config can't read env vars directly, so we substitute
    # the two $SUPABASE_*_KEY tokens into the image-baked template at container
    # start using `sed` (NOT the classic `eval "echo \"$(cat ...)\""` trick —
    # that re-parses the whole YAML as a shell command, and breaks as soon as the
    # file contains its own embedded quotes, e.g. `_format_version: "2.1"`).
    # NOTE: every $ below is doubled ($$) because Compose itself interpolates
    # $VAR in compose-file strings before the container ever sees them; $$ is
    # how you get a literal single $ through to the container's shell.
    #
    # This MUST be one physical line (or a YAML list with one string per exec
    # arg) — a folded (">") block scalar with mixed indentation previously
    # inserted an unintended line break mid-command, splitting it into
    # fragments that bash then tried to run as separate, broken commands.
    entrypoint:
      - bash
      - -c
      - 'sed -e "s|\$$SUPABASE_ANON_KEY|$$SUPABASE_ANON_KEY|g" -e "s|\$$SUPABASE_SERVICE_KEY|$$SUPABASE_SERVICE_KEY|g" /home/kong/kong.yml.template > /home/kong/kong.yml && /docker-entrypoint.sh kong docker-start'
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    # Public API gateway on internal port 8000.
    #
    # Under COOLIFY (default): do NOT publish a host port — Coolify's own
    # dashboard already uses 8000, and its proxy routes your api.* domain to this
    # container internally. So we only `expose` the port.
    #
    # For a NON-Coolify host with a reverse proxy running on the host (e.g. the
    # bundled Caddyfile), uncomment the `ports:` block below to publish it.
    expose:
      - "8000"
    # ports:
    #   - "${KONG_HTTP_PORT:-8000}:8000/tcp"

  studio:
    image: supabase/studio:2025.06.30-sha-6f5982d
    restart: unless-stopped
    depends_on:
      - meta
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: TamFam
      DEFAULT_PROJECT_NAME: TamFam
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${API_EXTERNAL_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
    # Bind Studio to localhost only — administer via an SSH tunnel, never expose it.
    ports:
      - "127.0.0.1:3001:3000/tcp"

  meta:
    image: supabase/postgres-meta:v0.89.3
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "8080"

volumes:
  db-data:
