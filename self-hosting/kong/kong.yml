_format_version: "2.1"
_transform: true

# ---------------------------------------------------------------------------
# API gateway routes for the TamFam self-hosted Supabase stack.
# $SUPABASE_ANON_KEY / $SUPABASE_SERVICE_KEY are substituted from the
# environment at container start (see the kong service entrypoint).
# ---------------------------------------------------------------------------

consumers:
  - username: anon
    keyauth_credentials:
      - key: $SUPABASE_ANON_KEY
  - username: service_role
    keyauth_credentials:
      - key: $SUPABASE_SERVICE_KEY

acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

services:
  # GoTrue (auth). Open so clients can sign in; GoTrue enforces its own rules.
  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1-route
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors

  # PostgREST (REST API). Requires a valid apikey; RLS enforces authorization.
  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1-route
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true
          key_names:
            - apikey
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon
